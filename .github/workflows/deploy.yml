name: Deploy Frontend Gritar

on:
  push:
    branches:
      - main # Cambia a 'master' si esa es tu rama principal

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código en GitHub
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Compilar proyecto
        run: |
          npm install
          npm run build

      - name: Decodificar Llave SSH
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | base64 -d > /tmp/llave_ssh
          chmod 600 /tmp/llave_ssh

      - name: Subir archivos a tu VPS
        run: |
          # Crear las carpetas destino por si las borraste
          ssh -i /tmp/llave_ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} "mkdir -p /var/www/gritar/dist"
          
          # Copiar la carpeta 'dist' ya compilada directo a tu servidor (Frontend)
          scp -i /tmp/llave_ssh -o StrictHostKeyChecking=no -r dist/* ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }}:/var/www/gritar/dist/

          # Copiar archivos del Backend
          scp -i /tmp/llave_ssh -o StrictHostKeyChecking=no server.js package.json package-lock.json ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }}:/var/www/gritar/
          
          # Iniciar el backend con Node.js y PM2 en el servidor
          ssh -i /tmp/llave_ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} "cd /var/www/gritar && npm install --omit=dev && npx pm2 restart gritar-backend || npx pm2 start server.js --name gritar-backend"
